
[main]
; thời gian tối đa tiếp nhận hiệu ứng click vào nhân vật khác
; tính bằng milli giây
ClickPlayerBeaweenDownAndUpLimitTime=500

; bật tắt khả năng ẩn hiện của logo 18+
; cảnh báo chơi quá 180 phút mỗi ngày
Logo18AllowToHide=1
Logo18RoutineSecondsHide=900
Logo18RoutineSecondsLive=10

; âm thanh hiệu ứng skill, thời gian giãn cách khi trùng file âm thanh
